[files]
# Vendored assets and generated output are not spell-checked.
extend-exclude = [
  "*.js",
  "*.css",
  "*.json",
  "*.svg",
  "*.lock",
  "LICENSE-*",
  "book/book/",
  "target/",
]

[default.extend-words]
# `hae` is a Lean hypothesis name (hypothesis about `a`'s evaluation), not a misspelling of "have".
hae = "hae"
